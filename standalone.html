<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Football Press Matrix — 해외 공신력 기자 리포트 한눈에</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ── Six N. Five 무드: 따뜻한 오프화이트, 헤어라인, 미니멀 타이포 ── */
:root {
  --bg: #ffffff;
  --bg-cell: transparent;
  --bg-raise: #fafafa;
  --line: #e3e2de;
  --line-soft: #efeeeb;
  --glass: rgba(255, 255, 255, 0.5);
  --glass-strong: rgba(255, 255, 255, 0.68);
  --glass-border: rgba(255, 255, 255, 0.7);
  --ink: #161513;
  --ink-soft: #6f6a60;
  --ink-faint: #b3b0a8;
  --accent: #161513;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body,
#root {
  height: 100%;
}

@font-face {
  font-family: 'Twemoji Country Flags';
  src: url('https://cdn.jsdelivr.net/npm/country-flag-emoji-polyfill@0.1.8/dist/TwemojiCountryFlags.woff2') format('woff2');
  unicode-range: U+1F1E6-1F1FF, U+1F3F4, U+E0062-E0063, U+E0065, U+E0067, U+E006C, U+E006E, U+E0073-E0074, U+E0077, U+E007F;
}

body {
  font-family: 'Twemoji Country Flags', 'Inter', 'Noto Sans KR', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background:
    radial-gradient(580px 420px at 12% 8%, rgba(120, 120, 120, 0.06), transparent 70%),
    radial-gradient(640px 480px at 88% 18%, rgba(140, 150, 165, 0.06), transparent 70%),
    radial-gradient(720px 560px at 50% 100%, rgba(120, 120, 120, 0.05), transparent 70%);
}

.app {
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── 시작 페이지 ────────────────────── */
.home {
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.home-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 32px 12px;
}

.home-date {
  font-size: 12.5px;
  letter-spacing: 0.14em;
  color: var(--ink-faint);
  text-transform: uppercase;
}

.home-hero {
  text-align: center;
  margin-top: 3vh;
  padding: 0 24px;
}

.hero-kicker {
  display: inline-block;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 26px;
}

.hero-title {
  font-size: clamp(34px, 5vw, 64px);
  font-weight: 600;
  line-height: 1.12;
  letter-spacing: -0.02em;
}

.hero-sub {
  margin-top: 18px;
  font-size: 14.5px;
  letter-spacing: 0.06em;
  color: var(--ink-soft);
  text-transform: uppercase;
}

.home-cards {
  display: flex;
  width: min(1040px, calc(100% - 64px));
  margin: 3.5vh auto 0;
}

.hcard {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  text-align: left;
  gap: 0;
  min-height: 236px;
  padding: 24px 24px 20px;
  background: transparent;
  border: none;
  border-right: 1px solid var(--line-soft);
  font-family: inherit;
  color: var(--ink);
  cursor: pointer;
  transition: background 0.3s, color 0.3s;
}

.hcard:last-child {
  border-right: none;
}

.hcard:hover {
  background: var(--ink);
  color: var(--bg);
}

.hc-num {
  font-size: 12.5px;
  letter-spacing: 0.2em;
  color: var(--ink-faint);
  margin-bottom: auto;
}

.hcard:hover .hc-num {
  color: var(--bg);
  opacity: 0.6;
}

.hc-title {
  font-size: clamp(24px, 2.6vw, 34px);
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-top: 32px;
}

.hc-desc {
  margin-top: 12px;
  font-size: 14px;
  line-height: 1.65;
  color: var(--ink-soft);
}

.hcard:hover .hc-desc {
  color: var(--bg);
  opacity: 0.75;
}

.hc-cta {
  margin-top: 22px;
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  border-bottom: 1px solid currentColor;
  padding-bottom: 2px;
}

.hcard-soon .hc-cta {
  color: var(--ink-faint);
  border-bottom-color: transparent;
}

.hcard-soon:hover .hc-cta {
  color: var(--bg);
  opacity: 0.6;
}

.home-foot {
  margin: 18px auto 18px;
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faint);
  padding: 0 24px;
  text-align: center;
}

/* Coming soon 페이지 */
.soon-page {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  text-align: center;
  padding: 24px;
}

.soon-page h2 {
  font-size: 38px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.soon-page p {
  font-size: 13px;
  color: var(--ink-soft);
  letter-spacing: 0.05em;
}

.soon-back {
  position: absolute;
  top: 22px;
  left: 28px;
  background: none;
  border: none;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-soft);
  cursor: pointer;
}

.soon-back:hover {
  color: var(--ink);
}

/* 사이드바 Home 버튼 */
.side-home {
  background: none;
  border: none;
  font-family: inherit;
  text-align: left;
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-soft);
  cursor: pointer;
  padding: 4px 10px 16px;
}

.side-home:hover {
  color: var(--ink);
}

.brand-btn {
  background: none;
  border: none;
  font-family: inherit;
  cursor: pointer;
  color: var(--ink);
  padding: 0;
}

/* ── 상단 로고/광고 자리 (플레이스홀더) ── */
.ad-band {
  display: flex;
  gap: 14px;
  padding: 12px 28px 16px;
  flex-shrink: 0;
}

.ph-box {
  border: 1px dashed var(--line);
  border-radius: 12px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-faint);
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 10px,
    rgba(22, 21, 19, 0.025) 10px,
    rgba(22, 21, 19, 0.025) 20px
  );
}

.ph-logo {
  width: 240px;
  height: 104px;
  flex-shrink: 0;
  font-size: 11px;
}

.ph-ad {
  flex: 1;
  height: 104px;
  font-size: 11px;
}

/* ── 상단 바 ─────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  gap: 28px;
  padding: 16px 28px 10px;
  flex-shrink: 0;
}

.brand {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  white-space: nowrap;
}

.topbar-meta {
  margin-left: auto;
  font-size: 12.5px;
  color: var(--ink-faint);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
}

/* 검색창 */
.searchbox {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--glass-strong);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  padding: 9px 16px;
  width: min(420px, 40vw);
  transition: border-color 0.2s;
}

.searchbox:focus-within {
  border-color: var(--line);
}

.search-icon {
  font-size: 16px;
  color: var(--ink-faint);
  line-height: 1;
}

.searchbox input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-family: inherit;
  font-size: 14.5px;
  color: var(--ink);
}

.searchbox input::placeholder {
  color: var(--ink-faint);
}

.search-clear {
  border: none;
  background: none;
  font-size: 16px;
  line-height: 1;
  color: var(--ink-soft);
  cursor: pointer;
  padding: 0 2px;
}

/* ── 본문: 사이드바 + 메인 ───────────── */
.body {
  flex: 1;
  display: flex;
  min-height: 0;
}

.sidebar {
  width: 224px;
  flex-shrink: 0;
  padding: 22px 16px;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.side-section {
  margin-bottom: 22px;
}

.side-label {
  display: block;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 8px;
  padding: 0 10px;
}

.side-item {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  font-family: inherit;
  color: var(--ink);
  cursor: pointer;
  padding: 9px 10px;
  margin-bottom: 2px;
  transition: background 0.25s;
}

.side-item:hover {
  background: var(--glass);
  border-radius: 10px;
}

.side-item.active {
  background: rgba(22, 21, 19, 0.84);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 10px;
}

.side-item.active .si-name,
.side-item.active .si-desc {
  color: var(--bg);
}

.side-item.soon {
  opacity: 0.65;
}

.si-name {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.03em;
}

.si-tag {
  font-style: normal;
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.14em;
  border: none;
  color: var(--ink-faint);
  padding: 0;
}

.si-desc {
  display: block;
  font-size: 12px;
  color: var(--ink-soft);
  margin-top: 2px;
}

.side-foot {
  margin-top: auto;
  padding: 14px 10px 0;
  font-size: 10.5px;
  line-height: 1.7;
  color: var(--ink-faint);
  letter-spacing: 0.04em;
}

.main {
  flex: 1;
  min-width: 0;
  display: block;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 18px 24px 28px;
  scrollbar-width: thin;
}

.no-results {
  margin: auto;
  text-align: center;
  color: var(--ink-soft);
}

.no-results p {
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
}

.no-results span {
  font-size: 14px;
}

/* ── 그리드 ─────────────────────────── */
.grid-scroll {
  overflow-x: auto;
  overflow-y: hidden;
  overscroll-behavior-x: contain;
  scrollbar-width: thin;
  scrollbar-color: var(--line) transparent;
}

.grid {
  flex: 1;
  display: grid;
  min-height: 0;
  width: max-content;
  min-width: 100%;
  transition: grid-template-columns 0.7s cubic-bezier(0.16, 1, 0.3, 1),
    grid-template-rows 0.7s cubic-bezier(0.16, 1, 0.3, 1);
  /* 바깥으로 갈수록 옅어지며 사라지는 페이드 */
  -webkit-mask-image: linear-gradient(to right, transparent 0, #000 34px, #000 calc(100% - 34px), transparent 100%),
    linear-gradient(to bottom, transparent 0, #000 30px, #000 calc(100% - 30px), transparent 100%);
  -webkit-mask-composite: source-in;
  mask-image: linear-gradient(to right, transparent 0, #000 34px, #000 calc(100% - 34px), transparent 100%),
    linear-gradient(to bottom, transparent 0, #000 30px, #000 calc(100% - 30px), transparent 100%);
  mask-composite: intersect;
}

.grid > * {
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  background-clip: padding-box;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
}

/* 코너 */
.g-corner {
  position: sticky;
  left: 0;
  z-index: 3;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 14px 16px;
  font-size: 11.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faint);
}

.g-corner span:last-child {
  align-self: flex-end;
}

/* 기자 헤더 — 영문 */
.g-jhead {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 3px;
  text-decoration: none;
  color: var(--ink);
  padding: 10px 8px;
  transition: background 0.25s;
}

.g-jhead:hover,
.g-jhead.is-on {
  background: var(--glass);
}

.jh-name {
  font-size: 16.5px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-align: center;
  white-space: nowrap;
}

.jh-outlet {
  font-size: 11.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-soft);
}

.jh-spec {
  font-size: 10px;
  color: var(--ink-faint);
}

/* 구단 셀 — 로고 중심 */
.g-club {
  position: sticky;
  left: 0;
  z-index: 2;
  background: var(--bg);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 16px;
  transition: background 0.25s;
}

.g-club.is-on {
  background: var(--glass);
}

.club-logo {
  position: relative;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.club-logo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.logo-fallback {
  display: none;
  position: absolute;
  inset: 0;
  border-radius: 50%;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
}

.club-text {
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.club-en {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.03em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.club-sub {
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--ink-faint);
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── 데이터 셀 ──────────────────────── */
.g-cell {
  position: relative;
  background: var(--bg-cell);
  transition: background 0.5s, opacity 0.5s, filter 0.5s;
}

.g-cell.has {
  cursor: pointer;
}

.g-jhead,
.g-club,
.g-corner {
  transition: opacity 0.5s, filter 0.5s, background 0.4s;
}

.g-cell.expanded {
  background: var(--glass);
  backdrop-filter: blur(16px) saturate(1.15);
  -webkit-backdrop-filter: blur(16px) saturate(1.15);
  cursor: default;
}

/* 축소 상태 프리뷰 */
.preview {
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 6px;
  padding: 14px 16px;
}

.pv-date {
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--ink-faint);
  text-transform: uppercase;
  display: flex;
  gap: 6px;
  align-items: baseline;
}

.pv-more {
  font-style: normal;
  font-weight: 700;
  color: var(--ink-soft);
}

.pv-title {
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--ink);
  display: -webkit-box;
  -webkit-line-clamp: 5;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.g-cell.has:hover .pv-title {
  text-decoration: underline;
}

/* 확장 상태 */
.xp {
  height: 100%;
  display: flex;
  flex-direction: column;
  animation: fadein 0.55s cubic-bezier(0.16, 1, 0.3, 1) 0.12s both;
}

@keyframes fadein {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: none;
  }
}

.xp-head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 14px 18px 10px;
  border-bottom: 1px solid var(--line-soft);
  flex-shrink: 0;
}

.xp-jname,
.xp-cname {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.xp-on {
  font-size: 11px;
  color: var(--ink-faint);
  font-style: italic;
}

.xp-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px 18px 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--line) transparent;
}

/* 최신 썸네일 카드 */
.thumb {
  display: flex;
  align-items: stretch;
  text-decoration: none;
  color: var(--ink);
  background: var(--glass-strong);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  overflow: hidden;
  transition: box-shadow 0.35s, transform 0.35s;
}

.thumb:hover {
  box-shadow: 0 10px 32px rgba(22, 21, 19, 0.1);
  transform: translateY(-2px);
}

/* 이미지 자리 — 아직 이미지가 없으므로 박스 플레이스홀더 (좌측 배치) */
.thumb-visual {
  position: relative;
  flex: 0 0 44%;
  min-height: 260px;
  margin: 12px;
  border: 1px dashed var(--line);
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 10px,
    rgba(22, 21, 19, 0.025) 10px,
    rgba(22, 21, 19, 0.025) 20px
  );
  display: flex;
  align-items: center;
  justify-content: center;
}

.thumb-img-label {
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--ink-faint);
}

.thumb-logo {
  position: absolute;
  right: 10px;
  bottom: 8px;
  height: 34px;
  width: 34px;
  object-fit: contain;
  opacity: 0.85;
}

.thumb-chip {
  position: absolute;
  top: 8px;
  left: 8px;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  background: #161513;
  color: #f3f1ec;
  padding: 4px 9px;
}

.thumb-body {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 20px 22px 20px 10px;
}

.thumb-date {
  display: block;
  font-size: 11.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 6px;
}

.thumb-title {
  display: block;
  font-size: clamp(19px, 1.8vw, 26px);
  font-weight: 600;
  line-height: 1.4;
  letter-spacing: -0.01em;
  margin-bottom: 10px;
}

.thumb-summary {
  font-size: 15px;
  line-height: 1.75;
  color: var(--ink-soft);
}

.thumb-link {
  display: inline-block;
  margin-top: 10px;
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: 0.08em;
  border-bottom: 1px solid var(--ink);
}

/* 이전 소식 */
.older {
  margin-top: 18px;
}

.older-label {
  display: block;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 8px;
}

.older-item {
  display: block;
  text-decoration: none;
  color: var(--ink);
  padding: 12px 0;
  border-top: 1px solid var(--line-soft);
}

.older-item:hover .oi-title {
  text-decoration: underline;
}

.oi-date {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-faint);
}

.oi-title {
  display: block;
  font-size: 16px;
  font-weight: 600;
  line-height: 1.5;
  margin: 4px 0 5px;
}

.oi-summary {
  font-size: 13.5px;
  line-height: 1.65;
  color: var(--ink-soft);
}

.oi-meta {
  display: inline-block;
  margin-top: 6px;
  font-size: 11.5px;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  text-transform: uppercase;
}

/* 모바일 대응 (간단) */
@media (max-width: 900px) {
  .app {
    height: auto;
    overflow: auto;
  }
  .sidebar {
    display: none;
  }
  .body {
    display: block;
  }
  .main {
    padding: 12px;
  }
  .searchbox {
    width: 100%;
  }
  .grid {
    display: block;
    border-top: 1px solid var(--line);
  }
  .g-corner,
  .g-jhead {
    display: none;
  }
  .g-cell.empty {
    display: none;
  }
  .g-cell.dimmed {
    opacity: 1;
  }
}

/* ── 리그 탭 ────────────────────────── */
.league-tabs {
  display: flex;
  gap: 22px;
  margin: 2px 0 16px;
  width: fit-content;
}

.ltab {
  background: none;
  border: none;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-faint);
  padding: 6px 0;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color 0.3s, border-color 0.3s;
}

.ltab:hover {
  color: var(--ink);
}

.ltab.on {
  color: var(--ink);
  border-bottom-color: var(--ink);
}

/* ── 기자 공신력 도형 ───────────────── */
.jh-cred {
  display: flex;
  gap: 3px;
  margin-top: 4px;
}

.jh-cred .dot {
  width: 6.5px;
  height: 6.5px;
  border-radius: 50%;
  border: 1px solid var(--ink-faint);
  display: inline-block;
}

.jh-cred .dot.on {
  background: var(--ink);
  border-color: var(--ink);
}

/* ── Transfer Tracker ───────────────── */
.tt {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* 맨 윗칸: 가격 한눈에 */
.tt-strip {
  padding: 2px 0 4px;
}

.tt-strip-label {
  display: block;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 10px;
}

.tt-strip-row {
  overflow: hidden;
  padding-bottom: 4px;
  -webkit-mask-image: linear-gradient(to right, transparent, #000 4%, #000 96%, transparent);
  mask-image: linear-gradient(to right, transparent, #000 4%, #000 96%, transparent);
}

.tt-marquee {
  display: flex;
  gap: 8px;
  width: max-content;
  animation: tt-marquee 55s linear infinite;
}

.tt-strip-row:hover .tt-marquee {
  animation-play-state: paused;
}

@keyframes tt-marquee {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

.tt-chip {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  background: var(--glass);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  font-family: inherit;
  padding: 8px 14px;
  cursor: pointer;
  transition: background 0.3s, color 0.3s, border-color 0.3s;
}

.tt-chip b {
  font-size: 13.5px;
  font-weight: 600;
  white-space: nowrap;
}

.tt-chip span {
  font-size: 12.5px;
  color: var(--ink-soft);
  white-space: nowrap;
}

.tt-chip.on {
  background: rgba(22, 21, 19, 0.84);
  border-color: transparent;
}

.tt-chip.on b,
.tt-chip.on span {
  color: var(--bg);
}

/* 선수 블록 */
.tt-blocks {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
}

.tt-card {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  text-align: left;
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  font-family: inherit;
  color: var(--ink);
  padding: 10px;
  cursor: pointer;
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.35s, background 0.35s;
  animation:
    tt-rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) var(--ed, 0s) both,
    tt-float 7s ease-in-out calc(var(--ed, 0s) + var(--fd, 0s) + 0.7s) infinite;
  will-change: transform;
}

@keyframes tt-rise {
  from {
    opacity: 0;
    transform: translateY(26px) rotate(var(--r, 0deg)) scale(0.96);
  }
  to {
    opacity: 1;
    transform: translateY(0) rotate(var(--r, 0deg)) scale(1);
  }
}

@keyframes tt-float {
  0%, 100% {
    transform: translateY(0) rotate(var(--r, 0deg));
  }
  50% {
    transform: translateY(-7px) rotate(calc(var(--r, 0deg) * -1));
  }
}

.tt-card:hover,
.tt-card.on {
  animation: none;
  transform: perspective(700px) rotateX(var(--tx, 0deg)) rotateY(var(--ty, 0deg)) translateY(-8px) scale(1.05);
  box-shadow: 0 18px 40px rgba(22, 21, 19, 0.14);
  background: var(--glass-strong);
  z-index: 2;
}

.tt-photo {
  aspect-ratio: 1 / 1;
  border: 1px dashed var(--line);
  background: repeating-linear-gradient(
    45deg, transparent, transparent 10px,
    rgba(22, 21, 19, 0.025) 10px, rgba(22, 21, 19, 0.025) 20px
  );
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 9px;
}

.tt-photo-label {
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--ink-faint);
}

.tt-name {
  font-size: 13.5px;
  font-weight: 600;
  letter-spacing: 0.01em;
}

.tt-route {
  font-size: 10.5px;
  color: var(--ink-soft);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tt-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
}

.tt-status {
  font-style: normal;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 2px 7px;
  border: 1px solid var(--line);
  color: var(--ink-soft);
}

.tt-status.st-done {
  background: var(--ink);
  color: var(--bg);
}

.tt-status.st-agreed {
  background: var(--ink);
  color: var(--bg);
  opacity: 0.75;
}

.tt-status.st-rumour {
  border-color: var(--ink-faint);
  color: var(--ink-faint);
}

.tt-price {
  font-size: 11px;
  font-weight: 600;
}

/* 가로 타임라인 */
.tt-timeline {
  background: var(--glass);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  padding: 18px 22px 22px;
}

.tt-tl-head {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line-soft);
  margin-bottom: 4px;
}

.tt-tl-head b {
  font-size: 19px;
  font-weight: 700;
}

.tt-tl-head span {
  font-size: 13px;
  color: var(--ink-soft);
}

.tt-tl-head em {
  font-style: normal;
  margin-left: auto;
  font-size: 15px;
  font-weight: 700;
}

.tt-tl-track {
  display: flex;
  overflow-x: auto;
  scrollbar-width: thin;
  padding-top: 14px;
}

.tt-ev {
  position: relative;
  flex: 0 0 270px;
  padding: 0 18px 4px 0;
  animation: tt-rise 0.5s cubic-bezier(0.16, 1, 0.3, 1) var(--ed, 0s) both;
}

.tt-ev::before {
  content: '';
  position: absolute;
  top: 27px;
  left: 0;
  right: 0;
  height: 1px;
  background: var(--line-soft);
}

.tt-ev:last-child::before {
  right: 40%;
}

.ev-date {
  display: block;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 8px;
}

.ev-node {
  position: relative;
  z-index: 1;
  display: block;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: var(--bg);
  border: 2px solid var(--ink);
  margin-bottom: 10px;
}

.ev-done .ev-node,
.ev-agreed .ev-node {
  background: var(--ink);
}

.ev-club {
  display: inline-block;
  font-size: 14.5px;
  font-weight: 700;
  margin-right: 6px;
}

.ev-type {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid var(--line-soft);
  padding: 1px 6px;
  color: var(--ink-soft);
}

.ev-fee {
  display: inline-block;
  margin-left: 6px;
  font-size: 13px;
  font-weight: 700;
}

.ev-note {
  margin-top: 6px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--ink-soft);
  padding-right: 6px;
}

/* ── 축구공 커서 ───────────────────── */
*,
*::before,
*::after {
  cursor: url("data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%2726%27%20height%3D%2726%27%20viewBox%3D%270%200%2026%2026%27%3E%3Ccircle%20cx%3D%2713%27%20cy%3D%2713%27%20r%3D%2711.2%27%20fill%3D%27white%27%20stroke%3D%27black%27%20stroke-width%3D%271.6%27%2F%3E%3Cpolygon%20points%3D%2713%2C8.2%2017.6%2C11.5%2015.8%2C16.8%2010.2%2C16.8%208.4%2C11.5%27%20fill%3D%27black%27%2F%3E%3Cpath%20d%3D%27M13%208.2V2.4%20M17.6%2011.5l5.5-1.8%20M15.8%2016.8l3.6%204.5%20M10.2%2016.8l-3.6%204.5%20M8.4%2011.5L2.9%209.7%27%20stroke%3D%27black%27%20stroke-width%3D%271.3%27%20fill%3D%27none%27%2F%3E%3C%2Fsvg%3E") 13 13, auto !important;
}

/* ── 홈: 캘린더 일정 (스크롤하면 한 화면) ── */
.home {
  overflow-y: auto;
}

.home-sched-label {
  display: block;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 12px;
}

.home-cal {
  min-height: calc(100vh - 56px);
  display: flex;
  flex-direction: column;
  width: min(1240px, calc(100% - 56px));
  margin: 7vh auto 0;
  padding-bottom: 8px;
}

.cal-wd-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-bottom: 8px;
}

.cal-wd {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-faint);
  padding-left: 11px;
}

.cal {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-auto-rows: minmax(116px, 1fr);
  gap: 8px;
}

.cal-day {
  background: var(--glass);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  padding: 8px 11px;
  overflow: hidden;
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s;
}

.cal-day:not(.off):not(.blank):hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 26px rgba(22, 21, 19, 0.08);
}

.cal-day.blank {
  visibility: hidden;
}

.cal-day.off {
  opacity: 0.38;
}

.cal-num {
  display: block;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--ink-faint);
  margin-bottom: 4px;
}

.cal-fx {
  display: block;
  font-size: 12.5px;
  font-weight: 600;
  line-height: 1.75;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.cal-fx b {
  font-weight: 400;
  margin-right: 3px;
}

.cal-fx i {
  font-style: normal;
  font-weight: 400;
  font-size: 9px;
  color: var(--ink-faint);
  margin: 0 4px;
}

.cal-later {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}

.cal-later-item {
  font-family: inherit;
  border: 1px solid var(--glass-border);
  cursor: pointer;
  color: var(--ink);
  transition: transform 0.25s, box-shadow 0.25s;
  font-size: 12.5px;
  font-weight: 600;
  padding: 7px 14px;
  border-radius: 99px;
  background: var(--glass);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
}

.cal-later-item:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(22, 21, 19, 0.08);
}

.cal-later-item b {
  font-weight: 400;
  margin-right: 4px;
}

/* 날짜 클릭 → 그날 경기 상세 모달 */
.cal-click {
  cursor: pointer;
}

.cal-click:hover {
  outline: 2px solid var(--accent);
  outline-offset: -1px;
}

.cal-detail {
  display: flex;
  flex-direction: column;
}

.cd-head {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.02em;
  margin-bottom: 12px;
}

.cd-row {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 11px 0;
  border-bottom: 1px solid var(--line-soft);
}

.cd-row:last-child {
  border-bottom: none;
}

.cd-comp {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-faint);
}

.cd-match {
  font-size: 15.5px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 9px;
  flex-wrap: wrap;
}

.cd-match i {
  font-style: normal;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-faint);
}

.cd-meta {
  font-size: 12px;
  color: var(--ink-soft);
}

/* ── Schedule: 캘린더(좌, 축소) + 순위·기록 패널(우) ── */
.sched-grid {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  width: min(1240px, calc(100% - 56px));
  margin: 18px auto 0;
}

.sched-cal {
  flex: 1.55;
  min-width: 0;
}

/* 우측 패널이 생긴 만큼 캘린더 칸을 작게 */
.sched-cal .home-cal {
  width: 100%;
  min-height: 0;
  margin: 0;
}

.sched-cal .cal {
  grid-auto-rows: minmax(74px, 1fr);
  gap: 6px;
}

.sched-cal .cal-day {
  padding: 6px 8px;
  border-radius: 10px;
}

.sched-cal .cal-num {
  font-size: 11px;
  margin-bottom: 2px;
}

.sched-cal .cal-fx {
  font-size: 11px;
  line-height: 1.5;
}

.sched-cal .cal-wd-row {
  gap: 6px;
}

.sched-side {
  flex: 0 0 300px;
  min-width: 0;
}

.sched-side-card {
  background: var(--glass);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.st-leagues {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.st-league {
  font-family: inherit;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  padding: 5px 10px;
  border-radius: 99px;
  border: 1px solid var(--line);
  background: none;
  color: var(--ink-soft);
  transition: background 0.2s, color 0.2s, border-color 0.2s;
}

.st-league.on {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}

.st-tabs {
  display: flex;
  gap: 16px;
  border-bottom: 1px solid var(--line-soft);
}

.st-tab {
  font-family: inherit;
  cursor: pointer;
  background: none;
  border: none;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-faint);
  padding: 4px 0 9px;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.2s, border-color 0.2s;
}

.st-tab.on {
  color: var(--ink);
  border-bottom-color: var(--ink);
}

.st-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11.5px;
}

.st-table th {
  text-align: right;
  font-weight: 600;
  color: var(--ink-faint);
  font-size: 10px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 3px 5px 6px;
  border-bottom: 1px solid var(--line-soft);
}

.st-table th.l,
.st-table td.l {
  text-align: left;
}

.st-table td {
  padding: 4px 4px;
  border-bottom: 1px solid var(--line-soft);
  text-align: right;
  white-space: nowrap;
  color: var(--ink-soft);
}

.st-table tr:last-child td {
  border-bottom: none;
}

.st-rank {
  color: var(--ink-faint);
  width: 16px;
}

.st-team {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-weight: 600;
  color: var(--ink);
}

.st-team img {
  width: 17px;
  height: 17px;
  object-fit: contain;
  flex-shrink: 0;
}

.st-team .fb {
  width: 17px;
  height: 17px;
  border-radius: 4px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 7px;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}

.st-pts {
  font-weight: 700;
  color: var(--ink);
}

.st-records {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.st-rec {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--line-soft);
}

.st-rec:last-child {
  border-bottom: none;
}

.st-rec-label {
  font-size: 12.5px;
  color: var(--ink-soft);
}

.st-rec-val {
  font-size: 13px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  gap: 7px;
}

.st-rec-val img {
  width: 18px;
  height: 18px;
  object-fit: contain;
}

.st-note {
  font-size: 10.5px;
  color: var(--ink-faint);
  margin-top: 2px;
}

/* ── 선수 호버 스탯 카드 (평균 위치·슛맵·xG) ── */
.tmodal-card {
  position: relative;
}

.stat-pop {
  position: absolute;
  z-index: 30;
  width: 204px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 12px;
  box-shadow: 0 14px 34px rgba(22, 21, 19, 0.16);
  padding: 11px 13px;
  pointer-events: none;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.15s, transform 0.15s;
}

.stat-pop.on {
  opacity: 1;
  transform: translateY(0);
}

.sp-head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 9px;
}

.sp-head b {
  font-size: 14.5px;
  font-weight: 700;
}

.sp-head span {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: var(--ink-faint);
}

.sp-pitch {
  position: relative;
  width: 100%;
  height: 116px;
  background: linear-gradient(var(--bg-raise), #fff);
  border: 1px solid var(--line-soft);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 7px;
}

.sp-pbox {
  position: absolute;
  left: 26%;
  right: 26%;
  top: 0;
  height: 26%;
  border: 1px solid var(--line);
  border-top: none;
}

.sp-parc {
  position: absolute;
  left: 42%;
  right: 42%;
  top: 26%;
  height: 11%;
  border: 1px solid var(--line);
  border-top: none;

@media (max-width: 900px) {

/* ── Transfers: 세로 아치 다이얼 ─────── */
.tt-arc {
  position: relative;
  display: flex;
  gap: 24px;
  margin-top: 10px;
}

/* 선수 이름 — 평면 원호 다이얼. 이름이 큰 원의 왼쪽 가장자리를 따라
   부채처럼 펼쳐지고, 중앙(선택)은 수평·가장 크게. 항목 수와 무관하게 높이 고정.
   휠을 한 칸씩 굴리거나 잡고 끌면 원호를 따라 돌아갑니다. */
.tt-wheel {
  position: relative;
  flex: 0 0 380px;
  height: 448px;
  overflow: visible;
  cursor: grab;
  touch-action: none;
  user-select: none;
}

.tt-wheel:active {
  cursor: grabbing;
}

/* 선택 지점 표시 점 (원호의 정점) */
.tt-wheel-dot {
  position: absolute;
  left: 196px;
  top: 50%;
  width: 7px;
  height: 7px;
  margin: -3.5px 0 0 -16px;
  border-radius: 50%;
  background: var(--accent);
  z-index: 5;
  pointer-events: none;
}

.tt-wheel-track {
  position: absolute;
  inset: 0;
  margin: 0;
  padding: 0;
  list-style: none;
}

/* 각 이름 항목 — JS가 inline transform(translate+rotate)으로 원호 위에 배치.
   왼쪽 시작점을 기준으로 회전해 글자가 곡선을 따라 기웁니다. */
.tt-wheel-item {
  position: absolute;
  top: 50%;
  left: 210px;
  list-style: none;
  transform-origin: 0% 50%;
  transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
  will-change: transform, opacity;
}

.tt-wheel-item button {
  display: inline-flex;
  align-items: flex-start;
  gap: 5px;
  background: none;
  border: none;
  font-family: inherit;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.015em;
  text-transform: uppercase;
  white-space: nowrap;
  color: var(--ink-faint);
  cursor: pointer;
  padding: 1px 4px;
  transition: color 0.3s, font-size 0.3s;
}

.tt-wheel-item.on button {
  color: var(--ink);
  font-weight: 800;
  font-size: 27px;
}

/* 이름 옆 인덱스 번호 (가격 순위) — 레퍼런스의 작은 위첨자 숫자 */
.tt-wheel-ix {
  font-size: 0.5em;
  font-weight: 700;
  letter-spacing: 0;
  color: var(--ink-faint);
  transform: translateY(0.2em);
}

.tt-wheel-item.on .tt-wheel-ix {
  color: var(--ink-soft);
}

/* 오른쪽 — 선수 이미지 + 정보 무대 */
.tt-stage {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 420px;
}

.tt-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  animation: tt-rise 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.tt-center-photo {
  width: 170px;
  height: 208px;
  flex-shrink: 0;
  border: 1px dashed var(--line);
  border-radius: 14px;
  background:
    repeating-linear-gradient(45deg, transparent, transparent 10px,
      rgba(22, 21, 19, 0.025) 10px, rgba(22, 21, 19, 0.025) 20px),
    var(--glass);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 14px;
}

.tt-photo-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top; /* 얼굴이 위쪽에 오므로 상단 정렬 — 통일감 */
  border-radius: 14px;
  display: block;
  background: var(--bg-raise);
}

.tt-center-name {
  font-size: 24px;

  letter-spacing: 0.01em;
}

.tt-center-route {

.tmodal-close:hover { color: var(--ink); }

.tm-head {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 18px;
}

.tm-flag { font-size: 44px; line-height: 1; }

.tm-name { font-size: 24px; font-weight: 800; letter-spacing: 0.01em; }

.tm-sub { font-size: 12.5px; color: var(--ink-soft); margin-top: 2px; }

.tm-grid {
  display: grid;
  grid-template-columns: minmax(300px, 420px) 1fr;
  gap: 26px;
  align-items: start;
}

@media (max-width: 760px) { .tm-grid { grid-template-columns: 1fr; } }

.tm-sec-label {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 8px;
}

/* 피치 + 바둑알 */
.pitch {
  position: relative;
  width: 100%;
  aspect-ratio: 3 / 3.6;
  background: linear-gradient(180deg, #eef4ee 0%, #e4eee4 100%);
  border: 1px solid var(--line);
  border-radius: 14px;
  overflow: hidden;
}

.pitch-line { position: absolute; left: 0; right: 0; top: 50%; height: 1px; background: rgba(22,21,19,0.12); }
.pitch-circle { position: absolute; left: 50%; top: 50%; width: 17%; aspect-ratio: 1; transform: translate(-50%,-50%); border: 1px solid rgba(22,21,19,0.12); border-radius: 50%; }
.pitch-box { position: absolute; left: 26%; right: 26%; height: 13%; border: 1px solid rgba(22,21,19,0.12); }
.pitch-box.top { top: -1px; border-top: none; }
.pitch-box.bot { bottom: -1px; border-bottom: none; }

.stone {
  position: absolute;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 86px;
  text-align: center;
  cursor: default;
}

.stone i {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: #161513;
  color: #fff;
  border: 2.5px solid #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-style: normal;
  font-size: 9.5px;
  font-weight: 800;
  letter-spacing: 0.04em;
  box-shadow: 0 4px 12px rgba(22, 21, 19, 0.25);
}

.stone b {
  margin-top: 3px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 86px;
  background: rgba(255,255,255,0.75);
  border-radius: 6px;
  padding: 0 4px;
}

.stone em {
  font-style: normal;
  font-size: 9.5px;
  color: var(--ink-soft);
  background: rgba(255,255,255,0.65);
  border-radius: 6px;
  padding: 0 4px;
}

/* 우측 명단 */
.tm-total {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 10px 14px;
  background: #161513;
  color: #fff;
  border-radius: 12px;
  margin-bottom: 14px;
}

.tm-total span { font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.7; }
.tm-total b { font-size: 18px; font-weight: 800; }

.tm-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 6px 2px;
  border-bottom: 1px solid var(--line-soft);
  font-size: 13px;
}

.tm-row b { flex: 1; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tm-row span { font-size: 10.5px; color: var(--ink-faint); width: 34px; }
.tm-row i { font-style: normal; font-size: 11px; color: var(--ink-soft); width: 38px; text-align: right; }
.tm-row em { font-style: normal; font-weight: 700; font-size: 12.5px; width: 64px; text-align: right; }

.tm-note { margin-top: 14px; font-size: 11px; color: var(--ink-faint); }

.tm-empty { font-size: 13px; color: var(--ink-soft); padding: 10px 0 16px; }

/* 모달 내 일정 */
.tm-fx { display: flex; flex-direction: column; }

.tm-fx-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding: 8px 2px;
  border-bottom: 1px solid var(--line-soft);
  font-size: 13px;
}

.tm-fx-row i { font-style: normal; font-size: 10.5px; letter-spacing: 0.08em; color: var(--ink-faint); width: 110px; }
.tm-fx-row b { flex: 1; font-weight: 600; }
.tm-fx-row b s { text-decoration: none; color: var(--ink-faint); font-size: 11px; margin: 0 4px; }
.tm-fx-row span { font-size: 11px; color: var(--ink-soft); }

.g-club-click { cursor: pointer; }

.g-club-click:hover { background: var(--glass); }

.tm-head + .tm-sec-label { margin-top: 6px; }


.g-cell .xp { display: none; }
.g-cell.expanded .xp { display: flex; }
.g-cell.expanded .preview { display: none; }

</style>

er-l-attacco-e-santiago-gimenez-493222","imageUrl":"https://net-storage.tcccdn.com/storage/gianlucadimarzio.com/img_notizie/thumb3/1f/1f77f02c65fcaa9d41ca8d00f8bbc0e3-29065-397o0o1432o1035z0b30.jpeg"},{"journalist":"wire","club":"tottenham","date":"2026-06-07","sourceType":"article","outlet":"CaughtOffside","titleKo":"토트넘-맨시티, 사비뉴 이적 '기본 합의' — £6,000만 규모","summaryKo":"토트넘과 맨체스터 시티가 브라질 윙어 사비뉴 이적에 대한 기본 합의에 도달했다는 보도가 나왔다. 이적료는 약 £6,000만 규모로, 핵심 재정 조건은 합의됐고 세부 계약 사항만 남은 것으로 전해졌다. 사비뉴는 세메뉴 영입 이후 출전 시간이 줄어 이적을 원하고 있다.","url":"https://www.caughtoffside.com/2026/06/07/tottenham-man-city-savinho-transfer-agreement-60m/","imageUrl":"https://icdn.caughtoffside.com/wp-content/uploads/2026/06/image_2026-06-08_034647877.jpg"},{"journalist":"wire","club":"mancity","date":"2026-06-07","sourceType":"article","outlet":"CaughtOffside","titleKo":"맨시티, 사비뉴 토트넘행 기본 합의 — £6,000만에 매각 수순","summaryKo":"맨체스터 시티가 사비뉴의 토트넘 이적에 대해 기본 합의에 도달했다는 보도가 나왔다. 약 £6,000만 규모의 핵심 재정 조건이 합의됐으며 세부 사항만 남은 상태다. 로마노도 '큰 문제는 보이지 않는다'며 조만간 성사 가능성을 언급했다.","url":"https://www.caughtoffside.com/2026/06/07/tottenham-man-city-savinho-transfer-agreement-60m/","imageUrl":"https://icdn.caughtoffside.com/wp-content/uploads/2026/06/image_2026-06-08_034647877.jpg"},{"journalist":"romano","club":"mancity","date":"2026-06-08","sourceType":"article","outlet":"Sports Mole","titleKo":"맨시티, 엘리엇 앤더슨 영입 위해 새로운 공식 입찰 준비","summaryKo":"맨시티가 노팅엄 포레스트의 미드필더 엘리엇 앤더슨 영입을 위해 새로운 공식 입찰을 준비 중이다. 맨시티는 £1억 600만 보장금과 £1,500만 애드온을 제시했으나, 포레스트는 £1억 2,000만 이상의 고정 이적료를 요구하고 있다. 앤더슨은 이미 맨시티와 개인 조건에 합의했다.","url":"https://www.sportsmole.co.uk/football/man-city/transfer-talk/news/man-city-prepare-new-bid-for-nottingham-forest-midfielder-elliot-anderson_598838.html","imageUrl":"https://www.sportsmole.co.uk/thumbor/s-wBqZ1vYK-5nVIc_sW1T11Qbn0=/720x410/smart/filters:format(webp)/https%3A%2F%2Fsportsmole-media-prod.s3.gra.io.cloud.ovh.net%2Fuploads%2F2026%2F06%2Felliot-anderson-future-email-sportmole-6a26ad7642777647555767.png"},{"journalist":"romano","cl "가제타 델로 스포르트는 유벤투스가 스팔레티 감독의 새 스쿼드에 창의성을 더하기 위해 레알 마드리드의 플레이메이커 브라힘 디아스 영입을 추진하고 있다고 1면으로 보도했다. 케프렌 튀랑은 적절한 제안이 오면 €4,500만~5,000만 선에서 매각을 검토할 수 있다.","url":"https://www.fanpage.it/sport/live/calciomercato-11-giugno-2026/","imageUrl":"https://staticfanpage.akamaized.net/wp-content/uploads/sites/27/2026/06/juventus-comolli-live-calciomercato-carnevali.jpg"},{"journalist":"dimarzio","club":"fiorentina","date":"2026-06-11","sourceType":"article","outlet":"Sky Sport Italia","titleKo":"디마르지오: 피오렌티나, 아틀레티코 루제리에 탐색전","summaryKo":"잔루카 디마르지오에 따르면 피오렌티나가 아틀레티코 마드리드의 레프트백 마테오 루제리에 대해 탐색적 문의를 진행했다. 다만 아틀레티코는 그를 잔류시키길 원하고 선수 본인도 시메오네 곁에 남길 원해 성사 가능성은 낮다는 평가다.","url":"https://www.napolimagazine.com/calcio/articolo/sky-sondaggio-della-fiorentina-per-ruggeri-l-atletico-madrid-vuole-trattenerlo-11-06-2026","imageUrl":"https://napolimagazine.blob.core.windows.net/locandine/9e3c181a-f3ce-419d-9e1d-9adfd06147d0.jpg"},{"journalist":"dimarzio","club":"atletico","date":"2026-06-11","sourceType":"article","outlet":"Sky Sport Italia","titleKo":"디마르지오: 아틀레티코, 루제리 잔류 방침 — 피오렌티나 문의 일축","summaryKo":"피오렌티나가 마테오 루제리에 관심을 보였지만, 디마르지오는 아틀레티코 마드리드가 매각 의사가 없다고 전했다. 루제리는 지난 시즌 47경기 7도움을 기록하며 주전으로 자리잡았고 본인도 마드리드 잔류를 원하고 있다.","url":"https://www.napolimagazine.com/calcio/articolo/sky-sondaggio-della-fiorentina-per-ruggeri-l-atletico-madrid-vuole-trattenerlo-11-06-2026","imageUrl":"https://napolimagazine.blob.core.windows.net/locandine/9e3c181a-f3ce-419d-9e1d-9adfd06147d0.jpg"},{"journalist":"dimarzio","club":"roma","date":"2026-06-11","sourceType":"article","outlet":"Sky Italia (Siamo la Roma 인용)","titleKo":"디마르지오: 로마, 은디카 떠나면 루쿠미 영입 검토","summaryKo":"디마르지오에 따르면 로마는 에반 은디카가 매각될 경우의 대체자로 볼로냐의 콜롬비아 수비수 욘 루쿠미를 검토 중이다. 루쿠미의 바이아웃 조항은 2,800만 유로이며, 스팔레티의 유벤투스도 그를 강하게 원하고 있어 경쟁이 예상된다.","url":"https://www.siamolaroma.it/2026/06/11/calciomercato-roma-idea-lucumi-se-parte-ndicka/"},{"journalist":"romano","club":"como","date":"2026-06-11","sourceType":"article","outlet":"Napoli Magazine","titleKo":"로마노: 코모, 도르트문트와 얀 코우투 영입 합의 도달","summaryKo":"파브리지오 로마노에 따르면 코모가 보루시아 도르트문트로부터 얀 코우투를 영입하는 데 합의에 도달했다. 임대 형태로 2027년 6월까지 유효한 계약이 거론된다. 코우투는 니코 코바치 감독 체제에서 출전 시간이 크게 줄어든 상태였다.","url":"https://www.napolimagazine.com/calcio/articolo/mercato-romano-como-raggiunto-un-accordo-per-l-acquisto-di-couto-dal-borussia-dortmund-vicino-anche-11-06-2026","imageUrl":"https://napolimagazine.blob.core.windows.net/locandine/84d5fded-f90e-4a05-b6f9-0f8da6a95b78.jpg"},{"journalist":"romano","club":"dortmund","date":"2026-06-11","sourceType":"article","outlet":"Napoli Magazine","titleKo":"로마노: 도르트문트, 얀 코우투 코모행 합의","summaryKo":"로마노에 따르면 도르트문트가 풀백 얀 코우투의 코모 이적에 합의했다. 코우투는 2025-26 시즌 막판 10경기에서 131분 출전에 그치며 주전 경쟁에서 밀려 있었다. 독일 매체들은 도르트문트가 완전 이적 시 2,000만~2,500만 유로 수준을 원했다고 전했다.","url":"https://www.napolimagazine.com/calcio/articolo/mercato-romano-como-raggiunto-un-accordo-per-l-acquisto-di-couto-dal-borussia-dortmund-vicino-anche-11-06-2026","imageUrl":"https://napolimagazine.blob.core.windows.net/locandine/84d5fded-f90e-4a05-b6f9-0f8da6a95b78.jpg"},{"journalist":"ornstein","club":"fulham","date":"2026-06-11","sourceType":"article","outlet":"The Athletic (via Football Today)","titleKo":"오른스타인: 풀럼, 차기 감독으로 아르벨로아와 협상","summaryKo":"데이비드 오른스타인에 따르면 풀럼이 마르코 실바의 후임 감독 후보로 알바로 아르벨로아와 협상을 진행 중이다. 실바는 5년의 크레이븐 코티지 생활을 마치고 벤피카와 2년 계약을 맺었다. 아르벨로아는 올해 1월부터 시즌 종료까지 레알 마드리드 1군을 임시로 이끌었으며, 무리뉴 부임으로 자리를 떠난 상태다.","url":"https://footballtoday.com/2026/06/11/fulham-hold-talks-with-alvaro-arbeloa-to-replace-marco-silva/","imageUrl":"https://footballtoday.com/wp-content/uploads/2026/06/real-madrid-cf-v-athletic-club-laliga-ea-sports-1000x600.jpg"},{"journalist":"romano","club":"mancity","date":"2026-06-12","sourceType":"article","outlet":"FootballFanCast","titleKo":"로마노發, 포레스트가 맨시티의 신규 £121M 앤더슨 입찰 거절","summaryKo":"파브리지오 로마노에 따르면 노팅엄 포레스트가 엘리엇 앤더슨에 대한 맨체스터 시티의 신규 입찰(보장 £106M+애드온 £15M)을 거절했다. 포레스트는 고정 이적료 £120M 이상을 요구하며 프리미어리그 역대 최고액 미드필더 이적을 원하고 있다. 맨유는 입찰 경쟁에 참여하지 않기로 했다.","url":"https://www.footballfancast.com/fabrizio-romano-nottingham-forest-elliot-anderson-new-man-city-bid/","imageUrl":"https://static0.footballfancastimages.com/wordpress/wp-content/uploads/2026/04/england-s-elliot-anderson-during-the-press-conference-1.JPG"},{"journalist":"dimarzio","club":"milan","date":"2026-06-12","sourceType":"article","outlet":"Sky Sport Italia","titleKo":"디마르지오: 밀란 차기 감독, 글라스너 유력 — 주말 야이슬레·아모림 접촉 예정","summaryKo":"디마르지오에 따르면 올리버 글라스너가 밀란 차기 감독 후보 1순위를 유지하고 있으며, 이미 연봉 €300만~400만 규모의 2년 계약 제안을 받은 상태다. 밀란은 주말에 알아흘리의 마티아스 야이슬레(€600만 조항), 맨유를 떠난 후벵 아모림과도 추가 접촉할 예정이다.","url":"https://www.gianlucadimarzio.com/news-calcio/glasner-resta-candidato-forte-milan-previsti-contatti-jaissle-amorim-493424","imageUrl":"https://net-storage.tcccdn.com/storage/gianlucadimarzio.com/img_notizie/thumb3/4a/4a8d293fa69d03790d6cb07f708dd897-40754-oooz0000.jpeg"},{"journalist":"romano","club":"manutd","date":"2026-06-12","sourceType":"article","outlet":"Football365","titleKo":"로마노: 맨유, 마테우스 페르난데스 공식 입찰 준비 — 웨스트햄에 공식 접촉","summaryKo":"파브리지오 로마노에 따르면 맨유가 웨스트햄과의 공식 접촉 이후 미드필더 마테우스 페르난데스에 대한 입찰을 준비하고 있다. 페르난데스는 맨유의 미드필드 최우선 타깃으로 떠올랐으며 웨스트햄의 책정가는 약 £8,500만이다.","url":"https://www.football365.com/news/manchester-united-mateus-fernandes-bid-west-ham-united","imageUrl":"https://d2x51gyc4ptf2q.cloudfront.net/content/uploads/2026/06/12095436/Two-Images-Collage-Michael-Carrick-Fabrizio-Romano-1-1.jpg"},{"journalist":"chronicle","club":"newcastle","date":"2026-06-12","sourceType":"article","outlet":"Chronicle Live (via Geordie Boot Boys)","titleKo":"크로니클發: 뉴캐슬 내부자 '이번 여름 선수 매각 불가피' 인정","summaryKo":"크로니클에 전한 클럽 소식통에 따르면 뉴캐슬은 야망을 유지하며 새 영입을 진행하겠지만 '트레이딩을 더 잘해야 한다'며 이번 여름 일부 선수의 이탈을 시사했다. 고든 매각에 이어 토날리, 기마랑이스, 홀, 리브라멘토 등이 거취 관측 대상에 올라 있다.","url":"https://www.geordiebootboys.com/transfers/newcastle-united-latest-gordon-guimaraes-tonali-livramento-hall-2026/","imageUrl":"https://cdn1.geordiebootboys.com/uploads/16/2026/05/GettyImages-2263553313-scaled.jpg"},{"journalist":"ornstein","club":"tottenham","date":"2026-06-12","sourceType":"article","outlet":"The Athletic (via EPL Index)","titleKo":"오른스타인發: 브라이튼, 토트넘 수비수 부슈코비치에 3,000만 파운드 입찰","summaryKo":"디 애슬레틱의 데이비드 오른스타인에 따르면 브라이튼이 토트넘의 19세 크로아티아 센터백 루카 부슈코비치 영입을 위해 3,000만 파운드를 제시했다. 부슈코비치는 2025-26 시즌 함부르크 임대를 거쳤으며, 브라이튼 감독과는 독일 시절부터 서로 신뢰가 있는 사이로 알려졌다.","url":"https://eplindex.com/147294/david-ornstein-brighton-launch-30m-bid-for-tottenham-hotspur-star.html","imageUrl":"https://eplindex.com/wp-content/uploads/imago1065118005-scaled.jpg"},{"journalist":"falk","club":"frankfurt","date":"2026-06-12","sourceType":"article","outlet":"SPORT BILD (via Bavarian Football Works)","titleKo":"팔크發: 프랑크푸르트, 브라운 6,500만 유로 매각 눈앞","summaryKo":"크리스티안 팔크에 따르면 프랑크푸르트가 좌측 풀백 나타니엘 브라운을 바이에른 뮌헨에 보너스 포함 6,500만 유로 미만의 이적료로 보내는 협상에서 돌파구를 마련했다. 크뢰셰 단장이 직접 협상을 이끌었으며 매각이 임박한 상황이다.","url":"https://www.bavarianfootballworks.com/bayern-munich-transfer-news-rumors/214317/bayern-munich-close-to-getting-nathaniel-brown-for-just-under-e65-million","imageUrl":"https://platform.bavarianfootballworks.com/wp-content/uploads/sites/24/2026/06/gettyimages-2280957777.jpg?quality=90&amp;strip=all&amp;crop=0%2C10.732984293194%2C100%2C78.534031413613&amp;w=1200"},{"journalist":"tuttosport","club":"juventus","date":"2026-06-12","sourceType":"article","outlet":"Tuttosport","titleKo":"유벤투스, 카르네발리 신임 CEO 공식 선임… 코몰리는 합의 하에 떠나","summaryKo":"유벤투스가 사수올로에서 12년간 일한 조반니 카르네발리를 신임 CEO 겸 총괄 디렉터로 공식 선임했다. 카르네발리는 '존 엘칸과 구단의 신뢰에 감사하다'고 밝혔으며, 다미앵 코몰리는 구단과 상호 합의로 결별했다.","url":"https://www.tuttosport.com/news/calcio/serie-a/juventus/2026/06/12-149145928/carnevali_alla_juve_ufficiale_ringrazio_elkann_per_la_fiducia_ecco_quali_ruoli_avr_comolli_via"},{"journalist":"sport","club":"barcelona","date":"2026-06-12","sourceType":"article","outlet":"SPORT (via Barca Blaugranes)","titleKo":"바르셀로나, 압델카림 영구 영입 옵션 발동… 야말은 스페인 대표팀 완전 훈련 복귀","summaryKo":"바르셀로나가 함자 압델카림에 대한 150만 유로 매입 옵션을 발동해 2029년까지 계약을 맺는다. 한편 라민 야말과 니코 윌리엄스는 월드컵 베이스캠프에서 스페인 대표팀 완전 훈련에 복귀했으며, 데 라 푸엔테 감독은 야말이 개막전에 짧게라도 나설 수 있을 것으로 봤다.","url":"https://www.barcablaugranes.com/ 26-06-12","sourceType":"article","outlet":"TEAMtalk","titleKo":"팀톡: 맨유, 아스널에 래시포드 제안 — 마르티넬리 스왑설","summaryKo":"팀톡은 바르셀로나의 완전 영입 불발 이후 맨유가 마커스 래시포드를 아스널에 제안했다고 보도했다. 아르테타 감독이 가브리엘 마르티넬리 매각을 승인하면서 윙어 간 스왑 딜 가능성이 거론된다. 신뢰도가 낮은 매체의 루머 단계 보도다.","url":"https://www.teamtalk.com/news/marcus-rashford-arsenal-stunning-winger-swap-man-utd-mikel-arteta-approved-gabriel-martinelli-transfer","imageUrl":"https://images.teamtalk.com/content/uploads/2026/06/11200310/arsenal-wingers-leandro-trossard-gabriel-martinelli-noni-madueke.jpg"},{"journalist":"espn","club":"manutd","date":"2026-06-12","sourceType":"article","outlet":"ESPN","titleKo":"ESPN 루머 종합: 맨유, 리즈 GK 달로우 영입 검토","summaryKo":"ESPN 이적 루머 종합에 따르면 맨유가 백업 골키퍼 보강을 위해 리즈의 칼 달로우 영입을 살펴보고 있다. 같은 기사에서 아스널이 훌리안 알바레스 영입전의 선두로 꼽혔으며, 레알 마드리드와 바르셀로나의 입찰은 불발됐다고 전했다.","url":"https://www.espn.com/soccer/story/_/id/49017065/transfer-rumors-news-arsenal-favorites-alvarez-real-madrid-barcelona-fail-bids","imageUrl":"https://a3.espncdn.com/combiner/i?img=%2Fphoto%2F2026%2F0610%2Fr1670980_1296x729_16%2D9.jpg"},{"journalist":"skysports","club":"kor","date":"2026-06-12","sourceType":"article","outlet":"Sky Sports","titleKo":"월드컵: 한국, 체코에 2-1 역전승 — 황인범 환상골","summaryKo":"한국이 과달라하라에서 열린 2026 월드컵 A조 1차전에서 체코를 2-1로 꺾었다. 크레이치의 헤더로 선제골을 내줬으나 황인범이 이강인의 패스를 받아 동점골을 터뜨렸고, 교체 투입된 오현규가 80분 역전골을 넣었다. 한국은 멕시코와 조 1위를 다투게 됐다.","url":"https://www.skysports.com/football/korea-rep-vs-czech-rep/report/549766","imageUrl":"https://e0.365dm.com/26/06/1600x900/skysports-hwang-in-beom-south-korea_7271302.jpg?20260612045731"},{"journalist":"wire","club":"realmadrid","date":"2026-06-12","sourceType":"article","outlet":"Sports Illustrated","titleKo":"무리뉴의 레알 마드리드 구상: 니코 파스 바이백·올리세 관심","summaryKo":"무리뉴 부임 후 레알 마드리드가 코모로 임대 중인 니코 파스의 €900만 바이백 옵션 행사를 추진한다는 보도가 나왔다. 페레스 회장이 언급한 약 €1억 5,000만 규모의 '갈락티코' 영입 대상으로는 미카엘 올리세가 거론된다.","url":"https://www.si.com/es-us/futbol/ultimas-noticias-de-fichajes-del-real-madrid-jose-mourinho-julian-alvarez-michael-olise-y-mas","imageUrl":"https://images2.minutemediacdn.com/image/upload/c_crop,x_0,y_315,w_8343,h_4692/c_fill,w_1440,ar_1440:810,f_auto,q_auto,g_auto/images/GettyImages/mmsport/sports_illustrated_ftbol/01ktkwewzpdvmprnk2r4.jpg"},{"journalist":"skysports","club":"brighton","date":"2026-06-12","sourceType":"article","outlet":"Sky Sports","titleKo":"브라이튼, 토트넘 부슈코비치에 3,000만 파운드 공식 제안","summaryKo":"스카이 스포츠는 브라이튼이 토트넘의 19세 수비수 루카 부슈코비치에게 3,000만 파운드를 제안했다고 전했다. 부슈코비치는 함부르크 임대에서 분데스리가 시즌 베스트팀에 선정됐고, 토트넘은 반대로 브라이튼의 얀 폴 판 헤케 영입에 관심을 유지하고 있다.","url":"https://www.skysports.com/football/news/11095/13553329/luka-vuskovic-brighton-make-lb30m-offer-for-spurs-defender-as-roberto-de-zerbi-maintains-jan-paul-van-hecke-interest","imageUrl":"https://e0.365dm.com/26/06/1600x900/skysports-luka-vuskovic_7271562.jpg?20260612123413"},{"journalist":"falk","club":"bayern","date":"2026-06-12","sourceType":"article","outlet":"BILD (CaughtOffside 인용)","titleKo":"팔크: 응구모하 본인은 바이에른행에 긍정적이었다","summaryKo":"크리스티안 팔크에 따르면 리버풀 유망주 리오 응구모하는 바이에른 뮌헨 이적에 관심을 보였던 것으로 알려졌다. 다만 리버풀이 매각 불가 입장을 고수하면서 협상은 더 진전되지 않았다.","url":"https://www.caughtoffside.com/2026/06/12/liverpools-rio-ngumoha-seemed-keen-on-bayern-transfer/","imageUrl":"https://icdn.caughtoffside.com/wp-content/uploads/2026/06/COS-FeaturedHero-Image-Templates-58.jpg"},{"journalist":"moretto","club":"rayo","date":"2026-06-12","sourceType":"article","outlet":"Relevo (via Fichajes.net)","titleKo":"모레토: 라요 바예카노 감독 후보 3인 — 아라사테가 유력","summaryKo":"마테오 모레토에 따르면 이니고 페레스가 떠난 라요 바예카노 감독직에 전 오사수나 감독 하고바 아라사테가 유력 후보로 떠올랐다. 양측 간 구두 합의 정황이 있으나 최종 계약은 아직이며, 베냐트 산호세와 파블로 에르난데스도 후보 명단에 올라 있다.","url":"https://www.fichajes.net/noticias/tres-opciones-banquillo-rayo-vallecano-20260612.html","imageUrl":"https://www.fichajes.net/sites/default/files/styles/epsa_detail_thumbail/public/2026-06/tres-opciones-banquillo-rayo-vallecano.jpg?h=df3c6bf4&amp;itok=0ZO6KaHH"},{"journalist":"wire","club":"barcelona","date":"2026-06-12","sourceType":"article","outlet":"SI (es-us)","titleKo":"라핀냐에 사우디 구단들 관심 — 바르사에 €5,000만 제안 전망","summaryKo":"문도 데포르티보발 보도를 인용한 종합 기사에 따르면 알힐랄과 알나스르가 라핀냐 영입을 노리고 있으며, 현재 연봉의 4배를 제시할 수 있다고 한다. 바르셀로나에는 약 5,000만 유로의 이적료 제안이 들어올 것으로 전망된다.","url":"https://www.si.com/es-us/futbol/ultimas-noticias-de-fichajes-del-fc-barcelona-julian-alvarez-raphinha-palestra-cucurella-y-mas","imageUrl":"https://images2.minutemediacdn.com/image/upload/c_crop,x_0,y_227,w_3009,h_1692/c_fill,w_1440,ar_1440:810,f_auto,q_auto,g_auto/images/GettyImages/mmsport/sports_illustrated_ftbol/01ktpbjbawa07xt9vj25.jpg"},{"journalist":"goal","club":"bayern","date":"2026-06-12","sourceType":"article","outlet":"GOAL Deutschland","titleKo":"바이에른, 브라운 영입 합의 도달 — €6,000만 이상 첫 여름 이적 성사 임박","summaryKo":"GOAL 독일판은 바이에른이 프랑크푸르트의 레프트백 나다니엘 브라운 영입 합의에 도달했다고 보도했다. 보너스 포함 6,500만 유로에 조금 못 미치는 규모로, 고정 금액과 보너스 배분 등 세부 사항만 남은 상태다.","url":"https://www.goal.com/de/listen/einigung-erzielt-fc-bayern-hat-ersten-sommer-transfer-offenbar-eingetuetet-fuer-mehr-als-60-millionen-euro/blt10310497f73d36e9","imageUrl":"https://assets.goal.com/images/v3/getty-2275320851/crop/MM5DGNRXGU5DEMBWG45G433XMU5DAORSGM2Q====/GettyImages-2275320851.jpg"},{"journalist":"kicker","club":"bayern","date":"2026-06-12","sourceType":"article","outlet":"kicker","titleKo":"키커: 바이에른, 고든 무산 후 공격 대안으로 사이바리·크루피 검토","summaryKo":"키커에 따르면 앤서니 고든의 바르셀로나행으로 영입이 무산된 바이에른이 PSV의 이스마엘 사이바리(25)를 공격 보강 옵션으로 검토하고 있다. 본머스에서 PL 13골을 기록한 19세 스트라이커 엘리 주니어 크루피도 후보로 거론된다. 쾰른이 구매 옵션을 행사하지 않은 펠리페 차베스는 바이에른으로 복귀한다.","url":"https://www.kicker.de/fc-bayern-muenchen/team-transfers"},{"journalist":"plettenberg","club":"dortmund","date":"2026-06-12","sourceType":"article","outlet":"Sky DE (via GOAL)","titleKo":"플레텐베르크: 슐로터베크 방출 조항, 7월 19일까지만 유효","summaryKo":"플로리안 플레텐베르크는 니코 슐로터베크의 도르트문트 계약에 포함된 €50-60M 규모 특별 방출 조항이 여름 이적시장 내내가 아니라 월드컵이 끝나는 7월 19일까지만 유효하다고 보도했다. 레알 마드리드는 무리뉴 감독의 의중에 따라 이미 선수 측과 접촉했으며, 해당 조항은 바이에른 뮌헨에는 적용되지 않는다.","url":"https://www.goal.com/en-ca/lists/bundesliga-borussia-dortmund-nico-schlotterbeck-real-madrid-liverpool-transfer/blt5acb9c2683dfa166","imageUrl":"https://assets.goal.com/images/v3/blt609a729dc92706b5/Nico%20Schlotterbeck%20Dortmund%202026.jpg"},{"journalist":"romano","club":"liverpool","date":"2026-06-12","sourceType":"article","outlet":"GiveMeSport","titleKo":"로마노, 리버풀의 얀 디오망데 첫 공식 입찰 확인","summaryKo":"파브리지오 로마노는 리버풀이 RB 라이프치히의 얀 디오망데 영입을 위해 첫 공식 입찰을 제출했으며 '상당한 금액'을 제시했다고 전했다. 라이프치히의 요구액은 약 €130M 이상으로 알려졌고, 리버풀은 PSG와의 경쟁 속에서도 선수 영입에 비교적 낙관적이다.","url":"https://www.givemesport.com/fabrizio-romano-liverpool-yan-diomande-offer/"},{"journalist":"skysports","club":"manutd","date":"2026-06-12","sourceType":"article","outlet":"Sky Sports","titleKo":"스카이스포츠 페이퍼톡: 발레바, 동료들에게 맨유 이적 가능성 언급","summaryKo":"스카이스포츠 페이퍼톡에 따르면 브라이튼 미드필더 카를로스 발레바가 동료 선수들과 올드 트래퍼드 이적 가능성에 대해 이야기를 나눴다고 한다. 맨유는 여름 미드필더 보강을 추진 중이며 발레바는 주요 후보 중 한 명으로 거론된다.","url":"https://www.skysports.com/football/transfer-paper-talk/12709/13552509/man-utd-transfer-news-brighton-midfielder-carlos-baleba-discusses-potential-old-trafford-move-with-players","imageUrl":"https://e0.365dm.com/25/03/1600x900/skysports-paper-talk-brand-refresh_6852897.jpg?20250311094415"},{"journalist":"wire","club":"manutd","date":"2026-06-12","sourceType":"article","outlet":"Sports Mole","titleKo":"트라브존스포르, 오나나 완전 영입 추진… 회장 \"정기적으로 협상 중\"","summaryKo":"맨체스터 유나이티드에서 트라브존스포르로 임대 중인 골키퍼 안드레 오나나의 완전 이적 협상이 진행 중이다. 트라브존스포르의 에르투으룰 도안 회장은 오나나 측과 정기적으로 대화하고 있다고 밝혔다. 맨유는 완전 이적료로 3,900만~4,300만 파운드 수준을 원하는 것으로 전해졌으며, 스카이 스포츠도 트라브존스포르의 완전 영입 추진을 보도했다.","url":"https://www.sportsmole.co.uk/football/man-utd/transfer-talk/news/permanent-departure-onana-in-regular-talks-over-man-united-exit_598712.html","imageUrl":"https://www.sportsmole.co.uk/thumbor/fPsGIEYleikf3AcYMNLj1QuOSoo=/720x410/smart/filters:format(webp)/https%3A%2F%2Fsportsmole-media-prod.s3.gra.io.cloud.ovh.net%2Fuploads%2F2026%2F05%2Fonana-5-6a08656df240d255435527.jpg"},{"journalist":"goal","club":"juventus","date":"2026-06-12","sourceType":"article","outlet":"GOAL España","titleKo":"유벤투스, 쇠를로트 재공략 — 6월 17일 전 타결 가능성","summaryKo":"유벤투스가 아틀레티코 마드리드의 알렉산데르 쇠를로트 영입을 다시 추진하며 6월 17일 이전 타결 가능성이 거론된다. 선수 측과는 2029년까지 연봉 약 400만 유로의 개인 합의를 마쳤고, 스팔레티 감독도 직접 의사를 확인했다. 다만 구단 간에는 유베 제시액(약 2,200만 유로)과 아틀레티코 요구액(4,000만 유로)의 격차가 남아 있으며, 니코 곤살레스가 협상 카드로 거론된다.","url":"https://www.goal.com/es/listados/la-juventus-vuelve-a-la-carga-por-sorloth-el-acuerdo-podria-cerrarse-antes-del-17-de-junio/blt9929c025f12444ea","imageUrl":"https://assets.goal.com/images/v3/blt73a0987ea5e6d15e/Social-16x9-Inter_2.png"},{"journalist":"goal","club":"atletico","date":"2026-06-12","sourceType":"article","outlet":"GOAL España","titleKo":"쇠를로트, 유벤투스와 개인 합의 — 아틀레티코는 €4,000만 고수","summaryKo":"알렉산데르 쇠를로트가 유벤투스와 2029년까지의 개인 조건에 합의한 가운데, 아틀레티코 마드리드는 최소 4,000만 유로의 이적료를 요구하고 있다. 유벤투스의 현재 제시액은 약 2,200만 유로로 격차가 크며, 아틀레티코는 쇠를로트 매각과 니코 곤살레스 영입 협상을 별개로 다룰 것을 요구하고 있다.","url":"https://www.goal.com/es/listados/la-juventus-vuelve-a-la-carga-por-sorloth-el-acuerdo-podria-cerrarse-antes-del-17-de-junio/blt9929c025f12444ea","imageUrl":"https://assets.goal.com/images/v3/blt73a0987ea5e6d15e/Social-16x9-Inter_2.png"},{"journalist":"espn","club":"worldcup","date":"2026-06-12","sourceType":"article","outlet":"ESPN","titleKo":"ESPN 월드컵 조별리그 2일차 종합 — 개최국 캐나다·미국 나란히 첫 경기","summaryKo":"ESPN이 6월 12일 월드컵 조별리그 2일차 경기 결과와 소식을 라이브 블로그로 정리했다. 개최국 캐나다가 토론토에서 보스니아 헤르체고비나와, 미국이 잉글우드에서 파라과이와 각각 첫 경기를 치렀다. 멕시코와 한국 관련 소식도 함께 다뤘다.","url":"https://www.espn.com/soccer/story/_/id/49038092/world-cup-2026-today-blog-12-06-2026-live-updates-news-fixtures-schedule-results-mexico-south-korea","imageUrl":"https://a4.espncdn.com/combiner/i?img=%2Fphoto%2F2026%2F0612%2Fr1671942_1296x729_16%2D9.jpg"},{"journalist":"kicker","club":"leverkusen","date":"2026-06-12","sourceType":"article","outlet":"kicker","titleKo":"레버쿠젠, 오니에카 엘버스베르크 임대 임박 — 재계약 후 1부 경험 쌓기","summaryKo":"키커에 따르면 바이어 레버쿠젠이 유망주 프랜시스 오니에카를 분데스리가 승격팀 엘버스베르크로 임대 보내기 직전이며, 구단 간 협상이 마무리 단계다. 레버쿠젠은 임대에 앞서 오니에카와의 계약을 연장할 계획이다. 오니에카는 지난 시즌 보훔 임대에서 2부 리그 8골을 기록한 바 있다.","url":"https://www.kicker.de/elversberg-vor-onyeka-leihe-4000000075113/transfermeldung"},{"journalist":"wire","club":"leverkusen","date":"2026-06-12","sourceType":"article","outlet":"Bulinews","titleKo":"리옹 윙어 아폰수 모레이라, 레버쿠젠행에 '그린라이트' — 이적료 €2,500만~3,000만 추산","summaryKo":"리옹의 21세 포르투갈 윙어 아폰수 모레이라가 레버쿠젠 이적에 동의 의사를 밝힌 것으로 전해졌다. 이적료는 €2,500만~3,000만 수준으로 추산되며, 양 구단 간 협상이 진행 중이다. 모레이라는 지난 시즌 리옹에서 37경기 8골 11도움을 기록했다.","url":"https://bulinews.com/portuguese-winger-gives-green-light-for-leverkusen-move","imageUrl":"https://bulinews.com/i/1280/17958.jpg"},{"journalist":"ornstein","club":"arsenal","date":"2026-06-12","sourceType":"article","outlet":"The Athletic","titleKo":"오른스타인: 아스널, 클뤼프 브뤼헤 윙어 초리스 영입 검토 — 약 €4,000만","summaryKo":"디 애슬레틱의 데이비드 오른스타인에 따르면 아스널이 클뤼프 브뤼헤의 그리스 윙어 크리스토스 초리스 영입을 검토 중이다. 24세 초리스는 지난 시즌 전 대회 52경기에서 22골 29도움을 기록했으며, 약 €4,000만(£3,450만)에 영입 가능한 것으로 평가된다. 초리스 검토는 모건 로저스 등 다른 공격수 영입 추진과 별개로 진행된다.","url":"https://onefootball.com/en/news/arsenal-exploring-deal-to-sign-club-brugges-christos-tzolis-43001801","imageUrl":"https://photobooth-api.onefootball.com/api/screenshot/%2Fv2%2Fphotobooth%2Fcms%2Fen%2F43001801%3Fdate=2026-06-13"},{"journalist":"wire","club":"arsenal","date":"2026-06-12","sourceType":"article","outlet":"CaughtOffside","titleKo":"아스널, 공격진 보강 후보로 모건 로저스·엘리 주니어 크루피 주시","summaryKo":"아스널이 여름 공격진 보강 후보로 애스턴 빌라의 모건 로저스와 본머스의 엘리 주니어 크루피를 주시하고 있다는 보도가 나왔다. 로저스는 2025-26시즌 전 대회 14골 12도움을 기록하며 BBC 등 복수 매체를 통해 아스널과 연결되고 있다.","url":"https://www.caughtoffside.com/2026/06/12/arsenal-eye-morgan-rogers-and-eli-junior-kroupi-transfers/","imageUrl":"https://icdn.caughtoffside.com/wp-content/uploads/2026/06/COS-FeaturedHero-Image-Templates-57.jpg"},{"journalist":"espn","club":"can","date":"2026-06-12","sourceType":"article","outlet":"ESPN","titleKo":"월드컵: 개최국 캐나다, 보스니아와 1-1 무승부 — 라린 78분 동점골","summaryKo":"개최국 캐나다가 토론토에서 열린 월드컵 조별리그 첫 경기에서 보스니아 헤르체고비나와 1-1로 비겼다. 보스니아가 코너킥 상황에서 요보 루키치의 헤더로 선제골을 넣었고, 캐나다는 78분 사일 라린의 슈팅으로 동점을 만들었다.","url":"https://www.espn.com/soccer/match/_/gameId/760416/bosnia-herzegovina-canada","imageUrl":"https://a.espncdn.com/combiner/i?img=/i/espn/misc_logos/500/soccer.png"},{"journalist":"ornstein","club":"liverpool","date":"2026-06-12","sourceType":"article","outlet":"The Athletic (via EPL Index)","titleKo":"오른스타인: 리버풀, 라이프치히와 디오망데 직접 접촉 — €1억3,000만 요구액 확인","summaryKo":"데이비드 오른스타인이 리버풀이 RB 라이프치히 측과 얀 디오망데(19) 영입을 위해 접촉했다고 확인했다. 라이프치히는 매각 의사가 없으며 €1억3,000만 이상을 요구하고 있지만, 협상이 진전될 경우 리버풀이 선수 측과 가장 유리한 위치에 있는 것으로 알려졌다.","url":"https://eplindex.com/147112/david-ornstein-confirms-liverpool-are-pushing-to-sign-bundesliga-forward.html","imageUrl":"https://eplindex.com/wp-content/uploads/imago1073120098-scaled.jpg"},{"journalist":"wire","club":"milan","date":"2026-06-12","sourceType":"article","outlet":"Fanpage (이탈리아 종합)","titleKo":"랑닉, 밀란 감독직 제안 거절 — 아모림·글라스너·야이슬레 후보 경쟁 지속","summaryKo":"랄프 랑닉이 밀란의 감독직 제안을 거절했다고 이탈리아 매체들이 전했다. 밀란은 아모림, 글라스너, 야이슬레 등을 후보로 두고 새 감독 선임 작업을 이어가고 있다.","url":"https://www.fanpage.it/sport/live/calciomercato-news-di-oggi-in-diretta-e-il-giorno-delle-dimissioni-di-comolli-alla-juve-milan-tra-amorim-glasner-e-jaissle/","imageUrl":"https://staticfanpage.akamaized.net/wp-content/uploads/sites/27/2026/06/Rangnick-milan.jpg"},{"journalist":"wire","club":"manutd","date":"2026-06-12","sourceType":"article","outlet":"ESPN","titleKo":"더 리흐트, 허리 수술로 2026 월드컵 출전 불발 — 2026-27 시즌 초까지 결장","summaryKo":"맨체스터 유나이티드 수비수 마타이스 더 리흐트가 장기간 이어진 허리 부상으로 수술을 받아 네덜란드 대표팀의 2026 월드컵 명단에서 제외됐다. 더 리흐트는 지난해 11월 크리스탈 팰리스전 이후 결장 중이었으며, 6개월간 보존 치료를 시도했으나 결국 수술을 택했다. 복귀는 2026-27 시즌 초로 전망된다.","url":"https://www.espn.com/soccer/story/_/id/48783229/netherlands-defender-matthijs-de-ligt-ruled-world-cup-back-surgery","imageUrl":"https://a1.espncdn.com/combiner/i?img=%2Fphoto%2F2026%2F0516%2Fr1658851_1296x729_16%2D9.jpg"},{"journalist":"wire","club":"ned","date":"2026-06-12","sourceType":"article","outlet":"ESPN","titleKo":"네덜란드, 더 리흐트 월드컵 낙마 — 사비 시몬스에 이어 두 번째 핵심 이탈","summaryKo":"네덜란드 대표팀이 허리 수술을 받은 마타이스 더 리흐트를 2026 월드컵에서 제외하게 됐다. 무릎 중상을 입은 사비 시몬스에 이어 대회를 앞두고 발생한 두 번째 핵심 전력 이탈이다. 더 리흐트는 SNS를 통해 '6개월의 치료 끝에 수술이 유일한 선택지였다'고 밝혔다.","url":"https://www.espn.com/soccer/story/_/id/48783229/netherlands-defender-matthijs-de-ligt-ruled-world-cup-back-surgery","imageUrl":"https://a1.espncdn.com/combiner/i?img=%2Fphoto%2F2026%2F0516%2Fr1658851_1296x729_16%2D9.jpg"},{"journalist":"wire","club":"juventus","date":"2026-06-12","sourceType":"article","outlet":"Sportmediaset","titleKo":"카르네발리 체제 유벤투스 — 떠날 듯했던 블라호비치 잔류 가능성 재부상","summaryKo":"사수올로에서 합류한 카르네발리가 유벤투스 단장으로 부임하면서 이적시장 기조가 바뀌고 있다고 스포르트메디아세트가 전했다. 코몰리와의 불화로 이탈이 유력했던 블라호비치는 스팔레티 감독의 지지 속에 잔류 가능성이 다시 거론된다. 유벤투스는 레알 마드리드의 브라힘 디아스 영입도 추진 중이다.","url":"https://www.sportmediaset.mediaset.it/mercato/juventus/juventus-come-cambia-il-mercato-con-carnevali-rispunta-vlahovic_113115754-202602k.shtml","imageUrl":"https://img-api.cloud.mediaset.net/api/images/kn/v1/image_main/1200/675/113115752?r=47"},{"journalist":"dimarzio","club":"juventus","date":"2026-06-13","sourceType":"article","outlet":"gianlucadimarzio.com","titleKo":"디마르지오: 신임 CEO 카르네발리도 '디부' 마르티네스 영입 지지","summaryKo":"디마르지오는 유벤투스 신임 CEO 조반니 카르네발리가 새 체제의 첫 영입으로 에밀리아노 '디부' 마르티네스를 지지한다고 전했다. 카르네발리는 마르티네스 에이전트와 오랜 친분이 있으며, 선수는 유벤투스행을 확신하고 이미 토리노에서 집을 알아보기 시작했다.","url":"https://www.gianlucadimarzio.com/caffe-di-marzio/juve-martinez-carnevali-vota-dibu-colpo-corso-bianconero-493428","imageUrl":"https://icdn.football-italia.net/wp-content/uploads/2026/06/sc-freiburg-v-aston-villa-fc-uefa-europa-league-final-2026-1.jpg"},{"journalist":"moretto","club":"atletico","date":"2026-06-13","sourceType":"article","outlet":"Relevo (via EstoEsAtleti)","titleKo":"모레토: 아틀레티코 4명 정리 방침 — 그리즈만은 LAFC행 가능성","summaryKo":"마테오 모레토는 시메오네의 결정에 따라 아틀레티코 마드리드에서 4명의 선수가 이번 여름 떠날 수 있다고 보도했다. 특히 앙투안 그리즈만은 잔류보다 이적 쪽에 가까우며, 행선지로는 MLS의 로스앤젤레스 FC가 거론된다.","url":"https://estoesatleti.es/noticias/matteo-moretto-revela-las-cuatro-salidas-del-atletico-madrid-decision-simeone","imageUrl":"https://i2-prod.themirror.com/article1077838.ece/ALTERNATES/s1200d/1_Antoine-Griezmann.jpg"},{"journalist":"dimarzio","club":"torino","date":"2026-06-13","sourceType":"article","outlet":"gianlucadimarzio.com","titleKo":"토리노, 이냐치오 아바테 신임 감독 공식 선임 — 2년 계약","summaryKo":"토리노가 이냐치오 아바테를 1군 신임 감독으로 공식 발표했다. 아바테는 오는 7월 1일부터 지휘봉을 잡으며, 2028년 6월 30일까지 2년 계약을 체결했다. 아바테는 2008-09 시즌 토리노에서 선수로 뛴 경험이 있다.","url":"https://www.gianlucadimarzio.com/news-calcio/ignazio-abate-allenatore-torino-contratto-biennale-493447","imageUrl":"https://net-storage.tcccdn.com/storage/gianlucadimarzio.com/img_notizie/thumb3/2a/2ab28a5f82fafdd756a850b64e5c2f2f-11889-oooz0000.jpeg"},{"journalist":"romano","club":"realmadrid","date":"2026-06-13","sourceType":"article","outlet":"FootballTransfers","titleKo":"로마노 확인: 베르나르두 실바, 레알 마드리드행 합의 — 무리뉴의 첫 영입","summaryKo":"파브리지오 로마노는 베르나르두 실바가 레알 마드리드와 2년(+1년 옵션) 계약에 합의했다고 확인했다. 맨시티를 자유계약으로 떠나는 실바는 아틀레티코·바르셀로나와도 연결됐지만 무리뉴의 설득에 레알을 택했으며, 공식 발표는 월드컵 이후로 예상된다.","url":"https://www.footballtransfers.com/en/transfer-news/es-primera-division/2026/06/fabrizio-romano-confirms-real-madrid-signing-bernardo-silva-jose-mourinho-completes-barcelona-transfer-hijack","imageUrl":"https://www.football-espana.net/wp-content/uploads/2026/06/bernardo-silva-real-madrid-signing-world-cup.webp"},{"journalist":"romano","club":"mancity","date":"2026-06-13","sourceType":"article","outlet":"FootballTransfers","titleKo":"맨시티 떠난 베르나르두 실바, 레알 마드리드와 합의 완료","summaryKo":"맨시티에서 계약이 만료된 베르나르두 실바가 레알 마드리드행에 합의했다고 로마노가 보도했다. 협상 개시 36시간 만에 합의가 이뤄졌으며, 2년 계약에 1년 연장 옵션이 포함된 것으로 알려졌다.","url":"https://www.footballtransfers.com/en/transfer-news/es-primera-division/2026/06/fabrizio-romano-confirms-real-madrid-signing-bernardo-silva-jose-mourinho-completes-barcelona-transfer-hijack","imageUrl":"https://www.football-espana.net/wp-content/uploads/2026/06/bernardo-silva-real-madrid-signing-world-cup.webp"},{"journalist":"romano","club":"newcastle","date":"2026-06-13","sourceType":"article","outlet":"GiveMeSport","titleKo":"로마노: 뉴캐슬, 오사수나 빅토르 무뇨스에 새 입찰 제출","summaryKo":"뉴캐슬이 오사수나의 22세 윙어 빅토르 무뇨스 영입을 위해 새 공식 입찰을 제출했다고 로마노가 전했다. 고정 €3,500만에 추가 옵션 €500만 규모로, 레알 마드리드가 보유한 50% 지분과 우선매수권이 협상 변수로 꼽힌다.","url":"https://www.givemesport.com/fabrizio-romano-newcastle-submit-bid-victor-munoz/"},{"journalist":"teamtalk","club":"tottenham","date":"2026-06-13","sourceType":"article","outlet":"TEAMtalk","titleKo":"팀톡: 토트넘, 판 헤케 3차 입찰 승인 — 영입 합의 임박","summaryKo":"토트넘이 브라이턴 수비수 얀 파울 판 헤케 영입을 위한 인상된 3차 입찰을 승인했으며 이번에는 성사를 확신하고 있다고 팀톡이 보도했다. 판 헤케 본인도 데 제르비 감독과의 재회를 원하는 것으로 알려졌다.","url":"https://www.teamtalk.com/tottenham-hotspur/spurs-agree-jan-paul-van-hecke-signing-staggering-third-brighton-bid-approved","imageUrl":"https://images.teamtalk.com/content/uploads/2026/05/07154101/TT-Jan-Paul-van-Hecke-with-a-small-image-of-Roberto-De-Zerbi-1-1.jpg"},{"journalist":"teamtalk","club":"brighton","date":"2026-06-13","sourceType":"article","outlet":"TEAMtalk","titleKo":"브라이턴, 판 헤케 3차 입찰 수용 수순 — 토트넘행 가까워져","summaryKo":"브라이턴이 판 헤케에 대한 토트넘의 세 번째 입찰을 받아들일 가능성이 커졌다고 팀톡이 전했다. 앞선 두 차례 입찰은 거절됐지만, 인상된 제안으로 이적이 임박했다는 평가다.","url":"https://www.teamtalk.com/tottenham-hotspur/spurs-agree-jan-paul-van-hecke-signing-staggering-third-brighton-bid-approved","imageUrl":"https://images.teamtalk.com/content/uploads/2026/05/07154101/TT-Jan-Paul-van-Hecke-with-a-small-image-of-Roberto-De-Zerbi-1-1.jpg"},{"journalist":"moretto","club":"barcelona","date":"2026-06-13","sourceType":"article","outlet":"SI (Futbol)","titleKo":"모레토: 바르사, 카사도 6월 30일 전 매각 마무리 원해 — 모나코 유력","summaryKo":"마테오 모레토에 따르면 바르셀로나는 회계연도 마감인 6월 30일 이전에 마르크 카사도 매각을 마무리하길 원한다. 이적료는 약 €2,500만 규모로 모나코와 사우디 구단이 관심을 보이고 있으며, 바르사는 향후 재판매 지분 20%를 유지하는 조건을 추진 중이다.","url":"https://www.si.com/es-us/futbol/ultimas-noticias-de-fichajes-del-fc-barcelona-bernardo-silva-alex-remiro-marc-casado-ansu-fati-y-mas","imageUrl":"https://www.getfootballnewsfrance.com/assets/ud-las-palmas-v-fc-barcelona-la-liga-ea-sports-scaled.jpg"},{"journalist":"kicker","club":"leverkusen","date":"2026-06-13","sourceType":"article","outlet":"kicker / 공식 발표","titleKo":"레버쿠젠, 헤르타 베를린의 케네트 아이히호른 영입 공식 발표","summaryKo":"바이어 레버쿠젠이 헤르타 BSC의 유망주 케네트 아이히호른 영입을 공식 발표했다. 계약 기간은 2031년까지로, 레버쿠젠의 이번 여름 첫 주요 영입 중 하나다.","url":"https://www.bavarianfootballworks.com/bayern-munich-transfer-news-rumors/214319/icymi-bayer-leverkusen-announces-signing-of-kennet-eichhorn","imageUrl":"https://assets.bundesliga.com/contender/2025/7/imago1064685078.jpg?crop=601px,246px,2296px,1291px&fit=1200,630"},{"journalist":"teamtalk","club":"manutd","date":"2026-06-13","sourceType":"article","outlet":"TEAMtalk","titleKo":"팀톡: 바르사, 발데 매각 의향 — 맨유 레프트백 영입 청신호","summaryKo":"바르셀로나가 레프트백 알레한드로 발데(22)에 대한 오퍼를 들을 의향이 있는 것으로 전해졌다. 맨유는 약 5,000만 유로(£4,300만)에 영입 가능한 발데를 £6,000만의 루이스 홀보다 저렴한 대안으로 보고 있으며, 리크루트 디렉터 크리스토퍼 비벨이 내부적으로 발데 영입을 강력히 추천했다.","url":"https://www.teamtalk.com/manchester-united/barcelona-say-yes-selling-alejandro-balde-man-utd-advancing-newcastle-deal-lewis-hall-could-collapse","imageUrl":"https://icdn.caughtoffside.com/wp-content/uploads/2026/02/COS-FeaturedHero-Image-Templates-101.jpg"},{"journalist":"teamtalk","club":"barcelona","date":"2026-06-13","sourceType":"article","outlet":"TEAMtalk","titleKo":"바르셀로나, 발데 오퍼 청취 의향 — 맨유行 가능성 부상","summaryKo":"바르셀로나가 알레한드로 발데의 매각 오퍼를 들을 의향이 있다는 보도가 나왔다. 맨유가 레프트백 보강 후보로 접촉했으며, 이적료는 약 5,000만 유로 수준으로 거론된다. 발데 영입이 성사되면 뉴캐슬 루이스 홀 협상에 영향을 줄 수 있다.","url":"https://www.teamtalk.com/manchester-united/barcelona-say-yes-selling-alejandro-balde-man-utd-advancing-newcastle-deal-lewis-hall-could-collapse","imageUrl":"https://icdn.caughtoffside.com/wp-content/uploads/2026/02/COS-FeaturedHero-Image-Templates-101.jpg"},{"journalist":"plettenberg","club":"bayern","date":"2026-06-13","sourceType":"article","outlet":"Sky DE (via Bavarian Football Works)","titleKo":"바이에른-프랑크푸르트, 브라운 협상 '상당히 근접' — €5,500만 패키지 현실화","summaryKo":"플레텐베르크에 따르면 바이에른 뮌헨과 프랑크푸르트가 나다니엘 브라운 이적 합의에 상당히 근접했다. 양측이 서로 양보하며 보너스 포함 최대 5,500만 유로 규모 패키지가 현실적인 수준으로 거론되고, 남은 쟁점은 고정 이적료와 추가 옵션 구성이다. 브라운은 이미 2031년까지의 개인 조건에 구두 합의한 상태다.","url":"https://www.bavarianfootballworks.com/bayern-munich-transfer-news-rumors/215072/bayern-munich-eintracht-frankfurt-significantly-closer-on-nathaniel-brown-deal","imageUrl":"https://s.yimg.com/ny/api/res/1.2/IW81YxYP3QBDYXnPiLwpWA--/YXBwaWQ9aGlnaGxhbmRlcjt3PTEyMDA7aD04MDA7Y2Y9d2VicA--/https://media.zenfs.com/en/sb_nation_articles_115/8bb954f11a5483466ed99845a636e240"},{"journalist":"ornstein","club":"everton","date":"2026-06-13","sourceType":"article","outlet":"Everton News","titleKo":"오른스타인: 존 스톤스, 맨시티와 자유계약으로 결별 — 에버턴 복귀설에 업데이트","summaryKo":"데이비드 오른스타인은 존 스톤스가 계약 만료와 함께 맨체스터 시티를 자유계약 신분으로 떠나며, 구단 발표가 다음 주 예정돼 있다고 전했다. 상호 합의에 따른 결별이며, 데이비드 모이스 감독의 에버턴이 복귀를 원하지만 유럽 빅클럽들의 경쟁이 예상된다는 설명이다.","url":"https://www.everton.news/david-ornstein-shares-update-on-john-stones-future-after-rumours-of-everton-return/","imageUrl":"https://www.mancity.com/meta/media/ko2mzlow/stones-wide.jpg"},{"journalist":"ornstein","club":"mancity","date":"2026-06-13","sourceType":"article","outlet":"Everton News","titleKo":"존 스톤스, 10년 만에 맨시티 떠난다 — 다음 주 공식 발표 예정","summaryKo":"오른스타인에 따르면 31세 센터백 존 스톤스의 맨시티 이탈이 상호 합의로 확정됐으며 다음 주 공식 발표될 예정이다. 트로피로 가득한 10년을 뒤로하고 자유계약으로 떠나며, 에버턴을 포함한 유럽 주요 구단들의 관심이 예상된다.","url":"https://www.everton.news/david-ornstein-shares-update-on-john-stones-future-after-rumours-of-everton-return/","imageUrl":"https://www.mancity.com/meta/media/ko2mzlow/stones-wide.jpg"},{"journalist":"romano","club":"dortmund","date":"2026-06-13","sourceType":"article","outlet":"Archyde","titleKo":"로마노: 코모, 도르트문트와 얀 쿠투 임대 기본 합의","summaryKo":"코모가 보루시아 도르트문트와 얀 쿠투의 2027년 6월까지 임대 영입에 기본 합의했다고 로마노가 확인했다. 도르트문트는 당초 €2,000만~2,500만의 완전 이적료를 원했지만, 코바치 감독 체제에서 핵심이 아닌 쿠투의 임대안을 수용한 모양새다.","url":"https://www.archyde.com/yan-couto-transfer-como-agree-deal-in-principle-with-borussia-dortmund-exclusive/","imageUrl":"https://assets.bundesliga.com/contender/2024/7/Yan_Couto_Jersey_Swap_16x9.jpg?fit=1200,630"},{"journalist":"romano","club":"como","date":"2026-06-13","sourceType":"article","outlet":"Archyde","titleKo":"코모, 얀 쿠투 임대 영입 눈앞 — 파브레가스 스쿼드 보강 지속","summaryKo":"세스크 파브레가스의 코모가 도르트문트 풀백 얀 쿠투를 임대로 영입하는 데 기본 합의에 도달했다. 임대 ss-on-ismael-saibari-after-stalemate","imageUrl":"https://www.getfootballnewsgermany.com/assets/psv-eindhoven-v-ssc-napoli-uefa-champions-league-2025-26-league-phase-md3-1-1024x683.jpg"},{"journalist":"liverpoolecho","club":"liverpool","date":"2026-06-13","sourceType":"article","outlet":"Liverpool.com","titleKo":"리버풀 이적 라이브 — 디오망데 추진 속 맥 알리스터 거취 주목","summaryKo":"리버풀닷컴 라이브 블로그에 따르면 RB 라이프치히의 얀 디오망데가 리버풀 영입 리스트 최상단에 있으나, 라이프치히의 저항과 PSG의 관심이 변수다. 부진한 2025/26 시즌을 보낸 알렉시스 맥 알리스터는 유럽 복수 구단의 관심을 받고 있으며, 바르콜라 건의 결정도 임박한 것으로 전해졌다. 신임 감독 이라올라와 리처드 휴즈 단장이 여름 보강 작업을 주도하고 있다.","url":"https://www.liverpool.com/liverpool-fc-news/transfer-news/liverpool-transfer-news-live-diomande-34108338","imageUrl":"https://i2-prod.liverpool.com/article34115263.ece/ALTERNATES/s1200d/0_GettyImages-2279237255.jpg"},{"journalist":"romano","club":"manutd","date":"2026-06-13","sourceType":"article","outlet":"TEAMtalk","titleKo":"로마노: 에데르송 맨유행 '100% 확정' — 모든 서류 작업 완료","summaryKo":"파브리지오 로마노가 아탈란타 미드필더 에데르송의 맨체스터 유나이티드 이적이 '100% 확정'됐다고 전했다. 총 €4,500만 규모 패키지의 모든 서류 작업이 완료됐으며, 맨유는 이번 여름 추가 미드필더 영입도 계획 중이다.","url":"https://www.teamtalk.com/manchester-united/ederson-silva-will-join-man-utd-from-atalanta","imageUrl":"https://images.teamtalk.com/content/uploads/2026/06/06124543/Two-Images-Collage-Michael-Carrick-Silhouette-Player-6-1.jpg"},{"journalist":"teamtalk","club":"liverpool","date":"2026-06-13","sourceType":"article","outlet":"TEAMtalk","titleKo":"리버풀 등 PL 5개 클럽, 미트윌란 이한범 주시 — 월드컵 개막전 활약","summaryKo":"리버풀, 리즈, 첼시, 뉴캐슬, 브라이턴 등 프리미어리그 5개 클럽이 미트윌란의 한국 센터백 이한범(23)을 관찰 중이라고 팀톡이 전했다. 이한범은 한국의 월드컵 개막전 체코전 2-1 승리에서 인상적인 활약을 펼쳤으며, 계약이 1년밖에 남지 않아 이번 여름이 이적 적기로 평가된다.","url":"https://www.teamtalk.com/news/liverpool-leeds-among-five-premier-league-clubs-tracking-midtjylland-star-lee-han-beom","imageUrl":"https://images.teamtalk.com/content/uploads/2026/06/12124948/han-beom-lee-liverpool-leeds-badges-1.jpg"},{"journalist":"teamtalk","club":"kor","date":"2026-06-13","sourceType":"article","outlet":"TEAMtalk","titleKo":"월드컵 활약 이한범, 리버풀·첼시·뉴캐슬 등 PL 스카우트 시선 집중","summaryKo":"한국 대표팀 센터백 이한범이 월드컵 체코전 활약으로 프리미어리그 5개 클럽(리버풀·리즈·첼시·뉴캐슬·브라이턴)의 스카우트 명단에 올랐다. 2023년 FC서울에서 미트윌란으로 이적한 그는 덴마크 리그와 컵을 모두 제패했고, 컵 결승에서는 코펜하겐전 결승골을 넣었다.","url":"https://www.teamtalk.com/news/liverpool-leeds-among-five-premier-league-clubs-tracking-midtjylland-star-lee-han-beom","imageUrl":"https://images.teamtalk.com/content/uploads/2026/06/12124948/han-beom-lee-liverpool-leeds-badges-1.jpg"},{"journalist":"falk","club":"bayern","date":"2026-06-13","sourceType":"article","outlet":"BILD / Bayern Insider","titleKo":"팔크: 바이에른, 사이바리와 개인 합의 완료 — 상한선은 €5,000만","summaryKo":"크리스티안 팔크에 따르면 바이에른은 이스마엘 사이바리와 개인 조건에 합의했고 PSV와의 협상도 멀지 않은 상태다. 다만 바이에른은 €5,000만 이상은 지불하지 않을 방침이며, 공격진 보강 후보로는 라시포드와 크루피 등의 이름도 거론되고 있다.","url":"https://cfbayerninsider.com/2026/06/the-bayern-insider-ismael-saibari-talks-advance-after-gordon-blow-as-rashford-kroupi-linked/","imageUrl":"https://www.getfootballnewsgermany.com/assets/psv-eindhoven-v-ssc-napoli-uefa-champions-league-2025-26-league-phase-md3-1-1024x683.jpg"},{"journalist":"wire","club":"realmadrid","date":"2026-06-13","sourceType":"article","outlet":"Sports Illustrated","titleKo":"무리뉴, 니코 파스 €900만 바이백 조기 실행 요청 — 레알 재영입 추진","summaryKo":"스카이스포츠 사샤 타볼리에리에 따르면 조제 무리뉴 감독이 레알 마드리드에 코모 소속 니코 파스의 €900만 바이백 옵션을 가능한 한 빨리 실행해 달라고 요청했다. 레알은 무리뉴와 플로렌티노 페레스 체제에서 그바르디올, 비티냐, 주앙 네베스 등도 후보로 검토하며 대대적인 스쿼드 개편을 준비 중이다.","url":"https://www.si.com/es-us/futbol/ultimas-noticias-de-fichajes-del-real-madrid-gvardiol-nico-paz-silva-pedro-vitinha-y-joao-neves","imageUrl":"https://images2.minutemediacdn.com/image/upload/c_crop,x_0,y_244,w_4016,h_2259/c_fill,w_1440,ar_1440:810,f_auto,q_auto,g_auto/images/GettyImages/mmsport/sports_illustrated_ftbol/01ktvce00gjgpt87h7e4.jpg"},{"journalist":"wire","club":"worldcup","date":"2026-06-13","sourceType":"article","outlet":"CBS Sports","titleKo":"월드컵 3일차: 개최국 미국, 파라과이에 0-1 충격패 — 스위스는 카타르 3-0 완파","summaryKo":"6월 13일 조별리그에서 개최국 미국이 LA에서 파라과이에 0-1로 패하며 D조에서 불안하게 출발했다. 스위스는 카타르를 3
